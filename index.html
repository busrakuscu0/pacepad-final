<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PacePad | Core</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="flex-row">
      <header>
        <nav class="flex-column nav justify-space-between">
          <a href="./index.html" class="nav__logo"
            ><img src="./assets/pacepad-logo.svg" alt="Pacepad Logo" />
          </a>
          <ul class="flex-column nav__list">
            <li class="flex-row nav__list-item align-center">
              <img src="./assets/icons/core-icon.svg" alt="Core Icon" />
              <a href="./index.html" class="list-item--active">CORE</a>
            </li>
            <li class="flex-row nav__list-item align-center">
              <img src="./assets/icons/mission-icon.svg" alt="Mission Icon" />
              <a href="./missions/missions.html">MISSIONS</a>
            </li>
            <li class="flex-row nav__list-item align-center">
              <img src="./assets/icons/strategy-icon.svg" alt="Strategy Icon" />
              <a href="./strategies/strategies.html">STRATEGIES</a>
            </li>
          </ul>
          <a
            href="./missions/newmission.html"
            class="btn btn--primary br-10 text-center"
            >INITIATE MISSION</a
          >
        </nav>
      </header>
      <main class="flex-row main__container justify-space-between">
        <div class="flex-column workspace align-center">
          <div class="flex-row mission-input align-center br-10">
            <input
              type="text"
              id="createMissionInput"
              placeholder="Identify the target..."
              class="mission-input__field border-none"
              autocomplete="off"
            />
            <a
              href="./missions/newmission.html"
              class="btn btn--secondary br-10 text-center"
              id="mainInitiateLink"
              ><span class="flex-row mission-input__action align-center"
                >INITIATE <br />
                MISSION
                <img
                  src="./assets/icons/arrow-forward.svg"
                  alt="Arrow Right Icon"
              /></span>
            </a>
          </div>
          <a
            href="./missions/newmission.html"
            class="flex-column empty-state align-center"
            id="emptyState"
          >
            <span>
              <img
                class="empty-state__icon"
                src="./assets/icons/add-circle-icon.svg"
                alt="Add Icon"
              />
            </span>

            <span class="empty-state__title" id="emptyStateTitle"
              >Ready to initiate your first mission?</span
            >
            <span>Click to break down your mission.</span>
          </a>
          <div class="flex-column focus-list hidden" id="focusList">
            <h1 class="focus-list__title" id="focusListTitle">
              FOCUS MISSIONS
            </h1>
          </div>
          <div class="quote__container br-10" id="quoteContainer">
            <div class="flex-column quote__content">
              <p id="quoteText"></p>
              <p class="quote-author" id="quoteAuthor"></p>
            </div>
          </div>
        </div>
        <div class="flex-column dashboard align-center">
          <div class="flex-column progress-card align-center">
            <div
              class="flex-row progress-circle align-center progress-circle--lg"
            >
              <div class="flex-row inner-circle align-center">
                <span class="text-center progress-value--lg"
                  ><span class="percentage-symbol">%</span></span
                >
              </div>
            </div>
            <span class="progress__text"></span>
            <div class="timer__container">
              <div
                class="flex-row justify-space-between align-baseline timer__header"
              >
                <span class="timer__label">TIME REMAINING</span>
                <span class="timer__value" id="timeValue"></span>
              </div>
              <div class="timer__progress-bar">
                <div class="progress-bar--fill" id="progressFill"></div>
              </div>
            </div>
          </div>

          <a
            href="./strategies/strategies.html"
            class="flex-column strategy__indicator br-10"
          >
            <span class="indicator__label">CURRENT STRATEGY</span>
            <span class="indicator__text" id="currentStrategy">QUICK WINS</span>
          </a>
        </div>
      </main>
    </div>
    <footer class="flex-row footer align-baseline">
      <a href="./index.html">CORE</a>
      <span>© 2026, Pacepad. All rights reserved.</span>
      <div class="flex-row footer__info align-baseline">
        <a href="mailto:busra.kuscu@code2career.eu">Report</a>
        <p>• LOCAL DATA</p>
      </div>
    </footer>
    <template id="missionCardTemplate">
      <div class="flex-column mission-card align-center" id="missionCard">
        <div class="flex-row mission-card__header justify-space-between">
          <div class="flex-row">
            <div
              class="flex-row progress-circle align-center progress-circle--sm"
            >
              <div class="flex-row inner-circle align-center">
                <span class="progress-value progress-value--sm">0%</span>
              </div>
            </div>

            <div class="flex-column title-group">
              <h3 class="mission-card__title"></h3>
              <span class="mission-card__type text-center"></span>
            </div>
          </div>
          <span class="focus__badge br-10 text-center hidden">FOCUS</span>
          <div class="flex-row mission-card__status">
            <div class="flex-column status__card">
              <span class="status__label">TIME REMAINING</span>
              <span class="status__time"></span>
            </div>
            <span
              class="mission-card__toggle-icon"
              aria-label="Expand or collapse mission details"
              >▼</span
            >
          </div>
        </div>

        <div class="flex-column mission-card__body hidden">
          <ul class="flex-column mission-card__list align-baseline"></ul>
          <div class="flex-row card__ctas">
            <button
              type="button"
              class="btn action__button update__button br-10 text-center"
            >
              UPDATE
            </button>
            <button
              type="button"
              class="btn action__button complete-all__button br-10 text-center"
            >
              MARK ALL AS COMPLETE
            </button>

            <button
              type="button"
              class="btn action__button remove__button br-10 text-center"
            >
              REMOVE
            </button>
          </div>
        </div>
      </div>
    </template>
    <template id="cardStepTemplate">
      <li class="flex-row card__list-item justify-space-between">
        <label class="flex-row list-item__label align-center">
          <input
            type="checkbox"
            class="flex-row list-item__checkbox align-center"
          />
          <span class="list-item__text"></span>
        </label>
        <span class="list-item__time text-center"></span>
      </li>
    </template>
    <script src="./script.js"></script>
  </body>
</html>
