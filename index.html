<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PacePad | Core</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="body-flex">
      <header>
        <nav class="nav">
          <a href="#" class="nav__logo"
            ><img src="./assets/pacepad-logo.svg" alt="Pacepad Logo" />
          </a>
          <ul class="nav__list">
            <li class="nav__list-item">
              <img src="./assets/icons/core-icon.svg" alt="Core Icon" />
              <a href="#" class="list-item--active">CORE</a>
            </li>
            <li class="nav__list-item">
              <img src="./assets/icons/mission-icon.svg" alt="Missions Icon" />
              <a href="./missions.html">MISSIONS</a>
            </li>
            <li class="nav__list-item">
              <img
                src="./assets/icons/strategy-icon.svg"
                alt="Strategies Icon"
              />
              <a href="./strategies.html">STRATEGIES</a>
            </li>
          </ul>
          <a href="startmission.html" class="btn btn--primary"
            >INITIATE MISSION</a
          >
        </nav>
      </header>

      <main class="flex-row main__container justify-space-between">
        <div class="flex-column workspace">
          <div class="flex-row mission-creator">
            <input
              type="text"
              id="createMissionInput"
              placeholder="Identify the target..."
              class="mission-creator__input"
              autocomplete="off"
            />
            <a
              href="startmission.html"
              class="btn btn--secondary"
              id="mainInitiateLink"
              ><span class="flex-row btn__content"
                >INITIATE <br />
                MISSION
                <img
                  src="./assets/icons/arrow-forward.svg"
                  alt="Arrow Right Icon"
              /></span>
            </a>
          </div>
          <a
            href="startmission.html"
            class="flex-column empty-state"
            id="emptyState"
          >
            <span>
              <img
                class="empty-state__icon"
                src="assets/icons/add_2_16dp_1F1F1F_FILL1_wght400_GRAD0_opsz20.svg"
                alt="Add Icon"
              />
            </span>

            <span class="box__title" id="emptyStateTitle"
              >Ready to initiate your first mission?</span
            >
            <span class="box__text">Click to break down your mission.</span>
          </a>
          <div class="flex-column focus-list hidden" id="focusList">
            <h1 class="focus-list__title" id="focusListTitle">
              FOCUS MISSIONS
            </h1>
          </div>
          <div class="quote__container" id="quoteContainer">
            <div class="flex-column quote__content">
              <p id="quoteText"></p>
              <p class="quote-author" id="quoteAuthor"></p>
            </div>
          </div>
        </div>
        <div class="flex-column dashboard">
          <div class="flex-column progress-card">
            <div class="flex-row progress-circle progress-circle--lg">
              <div class="flex-row inner-circle">
                <span class="progress-value progress-value--lg"
                  ><span class="percentage-symbol">%</span></span
                >
              </div>
            </div>
            <span class="progress__text"></span>
            <div class="timer__container">
              <div class="flex-row justify-space-between timer__header">
                <span class="timer__label">TIME REMAINING</span>
                <span class="timer__value" id="timeValue"></span>
              </div>
              <div class="timer__progress-bar">
                <div class="progress-bar--fill" id="progressFill"></div>
              </div>
            </div>
          </div>

          <a href="./strategies.html" class="flex-column strategy__indicator">
            <span class="indicator__label">CURRENT STRATEGY</span>
            <span class="indicator__text" id="currentStrategy">QUICK WINS</span>
          </a>
        </div>
      </main>
    </div>
    <footer class="footer">
      <a href="#">CORE</a>
      <span>© 2026, Pacepad. All rights reserved.</span>
      <span class="footer-right">
        <a href="mailto:busra.kuscu@code2career.eu">Report</a>
        <p>• LOCAL DATA</p>
      </span>
    </footer>
    <template id="missionCardTemplate">
      <div class="flex-column mission-card" id="missionCard">
        <div class="flex-row mission-card__header">
          <div class="flex-row">
            <div class="flex-row progress-circle progress-circle--sm">
              <div class="flex-row inner-circle">
                <span class="progress-value progress-value--sm">0%</span>
              </div>
            </div>

            <div class="flex-column title-wrapper">
              <h3 class="mission-title"></h3>
              <span class="mission-card__type"></span>
            </div>
          </div>
          <span class="focus-badge hidden">FOCUS</span>
          <div class="flex-row mission-card__status">
            <div class="flex-column card__status">
              <span class="status__label">TIME REMAINING</span>
              <span class="status__time"></span>
            </div>
            <span class="chevron-icon">▼</span>
          </div>
        </div>

        <div class="flex-column mission-card__body hidden">
          <ul class="flex-column mission-card__list"></ul>
          <div class="flex-row card__ctas">
            <button class="btn action__button update__button">UPDATE</button>
            <button class="btn action__button complete-all__button">
              MARK ALL AS COMPLETE
            </button>

            <button class="btn action__button remove-card__button">
              REMOVE
            </button>
          </div>
        </div>
      </div>
    </template>
    <template id="cardStepTemplate">
      <li class="flex-row card__list-item">
        <label class="flex-row task-label">
          <input type="checkbox" class="task-check" autocomplete="off" />
          <span class="task-text"></span>
        </label>
        <span class="list-item__time"></span>
      </li>
    </template>
    <script src="./missions.js"></script>
  </body>
</html>
