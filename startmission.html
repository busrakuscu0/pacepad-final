<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PacePad | Start Mission</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="body-flex">
      <header>
        <nav class="nav">
          <a href="index.html" class="nav__logo"
            ><img src="./assets/pacepad-logo.svg" alt="Pacepad Logo" />
          </a>
          <ul class="nav__list">
            <li class="nav__list-item">
              <img src="./assets/icons/core-icon.svg" alt="Core Icon" />
              <a href="index.html">CORE</a>
            </li>
            <li class="nav__list-item">
              <img src="./assets/icons/mission-icon.svg" alt="Mission Icon" />
              <a href="missions.html" class="list-item--active">MISSIONS</a>
            </li>
            <li class="nav__list-item">
              <img src="./assets/icons/strategy-icon.svg" alt="Strategy Icon" />
              <a href="./strategies.html">STRATEGIES</a>
            </li>
          </ul>
          <a href="startmission.html" class="btn btn--primary"
            >INITIATE MISSION</a
          >
        </nav>
      </header>
      <main class="main__container">
        <h1>Architect Your Mission</h1>
        <p>
          Clarity is the fuel of focus. Break the monolith into atomic steps to
          reduce cognitive friction and keep your momentum alive.
        </p>
        <form method="get" class="form__container" action="missions.html">
          <fieldset>
            <legend>MASTER OBJECTIVE</legend>
            <input
              type="text"
              name="missionName"
              placeholder="Identify your main mission"
            />
          </fieldset>
          <fieldset>
            <legend class="section-title">Mission Type</legend>
            <div class="card-group">
              <label>
                <input
                  type="radio"
                  name="mission_type"
                  value="deep_work"
                  required
                />
                <div class="mission-card">
                  <div class="mission-title">Deep Work</div>
                </div>
              </label>

              <label>
                <input
                  type="radio"
                  name="mission_type"
                  value="urgent"
                  checked
                  required
                />
                <div class="mission-card">
                  <div class="mission-title">Urgent</div>
                </div>
              </label>

              <label>
                <input
                  type="radio"
                  name="mission_type"
                  value="routine"
                  required
                />
                <div class="mission-card">
                  <div class="mission-title">Routine</div>
                </div>
              </label>
              <label>
                <input
                  type="radio"
                  name="mission_type"
                  value="sprint"
                  required
                />
                <div class="mission-card">
                  <div class="mission-title">Sprint</div>
                </div>
              </label>
            </div>
          </fieldset>
          <fieldset></fieldset>
          <fieldset></fieldset>
        </form>
      </main>
    </div>
    <footer class="footer">
      <a href="index.html">CORE</a>
      <span>© 2026, Pacepad. All rights reserved.</span>
      <span class="footer-right">
        <a href="mailto:busra.kuscu@code2career.eu">Report</a>
        <p>• LOCAL DATA</p>
      </span>
    </footer>
    <script src="./missions.js"></script>
  </body>
</html>
