<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PacePad | Missions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div class="main-layout">
      <header>
        <nav class="nav">
          <div class="nav__header">
            <button
              class="flex-column hamburger"
              id="hamburgerButton"
              aria-label="Toggle menu"
            >
              <span class="hamburger__line"></span>
              <span class="hamburger__line"></span>
              <span class="hamburger__line"></span>
            </button>
            <a href="../index.html" class="nav__logo--mobile"
              ><img src="../assets/pacepad-logo.svg" alt="Pacepad Logo" />
            </a>
            <a
              href="../index.html#dashboard"
              class="btn btn--primary br-10 dashboard__button"
              id="dashboardButton"
            >
              Dashboard
            </a>
          </div>
          <a href="../index.html" class="nav__logo--desktop"
            ><img src="../assets/pacepad-logo.svg" alt="Pacepad Logo" />
          </a>

          <div class="flex-column nav__container" id="navListContainer">
            <ul class="flex-column nav__list">
              <li class="flex-row nav__list-item align-center">
                <img src="../assets/icons/core-icon.svg" alt="Core Icon" />
                <a href="../index.html">CORE</a>
              </li>
              <li class="flex-row nav__list-item align-center">
                <img
                  src="../assets/icons/mission-icon.svg"
                  alt="Mission Icon"
                />
                <a href="./missions/missions.html" class="list-item--active"
                  >MISSIONS</a
                >
              </li>
              <li class="flex-row nav__list-item align-center">
                <img
                  src="../assets/icons/strategy-icon.svg"
                  alt="Strategy Icon"
                />
                <a href="../strategies/strategies.html">STRATEGIES</a>
              </li>
            </ul>
            <a
              href="./missions/newmission.html"
              class="btn btn--primary br-10 text-center"
              >INITIATE MISSION</a
            >
          </div>
        </nav>
      </header>
      <main class="flex-row main__container">
        <div class="flex-column mission__container">
          <div class="flex-row justify-space-between align-baseline">
            <h1 class="missions__title">ATOMIC COMMAND CENTER</h1>

            <div class="flex-row button__container br-10">
              <button
                class="btn btn--tertiary btn--active br-10 text-center"
                id="activeButton"
              >
                Active
              </button>
              <button
                class="btn btn--tertiary br-10 text-center"
                id="completedButton"
              >
                Completed
              </button>
            </div>
          </div>

          <div class="flex-column" id="activeMissions">
            <div class="flex-row justify-space-between align-baseline">
              <h2>Active Missions</h2>
            </div>
            <a
              href="./newmission.html"
              class="flex-column empty-state"
              id="emptyState"
            >
              <span>
                <img
                  class="empty-state__icon"
                  src="../assets/icons/add-circle-icon.svg"
                  alt="Add Icon"
                />
              </span>
              <span class="empty-state__title" id="emptyStateTitle"
                >Ready to initiate your first mission?</span
              >
              <span>Click to break down your mission.</span></a
            >
          </div>

          <div class="status-message br-10 hidden" id="statusMessage">
            Mission completed successfully!
          </div>

          <div class="hidden" id="completedMissions">
            <h2>Completed Missions</h2>
          </div>
        </div>
      </main>
    </div>
    <footer class="footer">
      <span>© 2026, Pacepad</span>
      <a href="mailto:busra.kuscu@code2career.eu">Help & Support</a>
      <span>🟢 All data saved locally</span>
    </footer>
    <template id="missionCardTemplate">
      <div class="flex-column mission-card align-center" id="missionCard">
        <div class="flex-row mission-card__header justify-space-between">
          <div class="flex-row">
            <div
              class="flex-row progress-circle align-center progress-circle--sm"
            >
              <div class="flex-row inner-circle align-center">
                <span class="progress-value progress-value--sm">0%</span>
              </div>
            </div>

            <div class="flex-column title-group">
              <h3 class="mission-card__title"></h3>
              <span class="mission-card__type text-center"></span>
            </div>
          </div>
          <span class="focus__badge br-10 text-center hidden">FOCUS</span>
          <div class="flex-row mission-card__status">
            <div class="flex-column status__card">
              <span class="status__label">TIME REMAINING</span>
              <span class="status__time"></span>
            </div>
            <span
              class="mission-card__toggle-icon"
              aria-label="Expand or collapse mission details"
              >▼</span
            >
          </div>
        </div>
        <div class="flex-column mission-card__body hidden">
          <ul class="flex-column mission-card__list align-baseline"></ul>
          <div class="flex-row card__ctas">
            <button
              type="button"
              class="btn action__button update__button br-10 text-center"
            >
              UPDATE
            </button>
            <button
              type="button"
              class="btn action__button complete-all__button br-10 text-center"
            >
              MARK ALL AS COMPLETE
            </button>
            <button
              type="button"
              class="btn action__button remove__button br-10 text-center"
            >
              REMOVE
            </button>
          </div>
        </div>
      </div>
    </template>
    <template id="cardStepTemplate">
      <li class="flex-row card__list-item justify-space-between">
        <label class="flex-row list-item__label align-center">
          <input
            type="checkbox"
            class="flex-row list-item__checkbox align-center"
          />
          <span class="list-item__text"></span>
        </label>
        <span class="list-item__time text-center"></span>
      </li>
    </template>
    <script src="../script.js"></script>
  </body>
</html>
